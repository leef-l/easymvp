name: easymvp

x-admin-go-build: &admin-go-build
  context: ../../admin-go
  dockerfile: ../docker/build/Dockerfile.admin-go.dev
  args:
    GO_BASE_IMAGE: ${GO_BASE_IMAGE:-golang:1.25-bookworm}
    GO_PROXY: ${GO_PROXY:-https://goproxy.cn,direct}
    PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    APT_MIRROR: ${APT_MIRROR:-}
    APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}

x-admin-go-env: &admin-go-env
  TZ: ${TZ:-Asia/Shanghai}
  DB_HOST: ${DB_HOST:-mysql}
  DB_PORT: ${DB_PORT:-3306}
  DB_USER: ${DB_USER:-easymvp}
  DB_PASSWORD: ${DB_PASSWORD:-JKcHFJYXnkrB6BXE}
  DB_NAME: ${DB_NAME:-easymvp}
  REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
  REDIS_PASS: ${REDIS_PASS:-}
  JWT_SECRET: ${JWT_SECRET:-easymvp-secret-key}
  GOPROXY: ${GO_PROXY:-https://goproxy.cn,direct}
  GF_LOG_PATH: ${GF_LOG_PATH:-/workspace/admin-go/logs}
  GF_LOG_LEVEL: ${GF_LOG_LEVEL:-all}
  GF_LOG_STDOUT: ${GF_LOG_STDOUT:-false}
  GF_LOG_ROTATE_SIZE: ${GF_LOG_ROTATE_SIZE:-100M}
  GF_LOG_ROTATE_EXPIRE: ${GF_LOG_ROTATE_EXPIRE:-7d}
  GF_LOG_ROTATE_BACKUP_LIMIT: ${GF_LOG_ROTATE_BACKUP_LIMIT:-10}
  PATH: /usr/local/go/bin:/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/root/.local/share/uv/tools/aider-chat/bin:/root/.local/share/uv/tools/openhands/bin

services:
  redis:
    image: redis:7-alpine
    container_name: easymvp-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_HOST_PORT:-41000}:6379"
    volumes:
      - easymvp-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: easymvp-mysql
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-easymvp}
      MYSQL_USER: ${DB_USER:-easymvp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-JKcHFJYXnkrB6BXE}
    ports:
      - "${MYSQL_HOST_PORT:-41001}:3306"
    command:
      - "mysqld"
      - "--default-authentication-plugin=mysql_native_password"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--init-connect=SET NAMES utf8mb4"
      - "--skip-character-set-client-handshake"
    volumes:
      - easymvp-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  system:
    image: easymvp-admin-go-dev:latest
    build: *admin-go-build
    container_name: easymvp-system
    working_dir: /workspace/admin-go
    command: ["/bin/bash", "/opt/easymvp/docker/dev/start-go-app.sh", "system", "8000"]
    environment:
      <<: *admin-go-env
      APP_NAME: system
      APP_PORT: 8000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SYSTEM_HOST_PORT:-41002}:8000"
    volumes:
      - ../../admin-go:/workspace/admin-go
      - ./start-go-app.sh:/opt/easymvp/docker/dev/start-go-app.sh:ro
      - easymvp-go-cache:/go/pkg/mod
      - easymvp-go-build:/root/.cache/go-build
    restart: unless-stopped

  ai:
    image: easymvp-admin-go-dev:latest
    build: *admin-go-build
    container_name: easymvp-ai
    working_dir: /workspace/admin-go
    command: ["/bin/bash", "/opt/easymvp/docker/dev/start-go-app.sh", "ai", "8000"]
    environment:
      <<: *admin-go-env
      APP_NAME: ai
      APP_PORT: 8000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${AI_HOST_PORT:-41003}:8000"
    volumes:
      - ../../admin-go:/workspace/admin-go
      - ./start-go-app.sh:/opt/easymvp/docker/dev/start-go-app.sh:ro
      - easymvp-go-cache:/go/pkg/mod
      - easymvp-go-build:/root/.cache/go-build
    restart: unless-stopped

  mvp:
    image: easymvp-admin-go-dev:latest
    build: *admin-go-build
    container_name: easymvp-mvp
    working_dir: /workspace/admin-go
    command: ["/bin/bash", "/opt/easymvp/docker/dev/start-go-app.sh", "mvp", "8000"]
    environment:
      <<: *admin-go-env
      APP_NAME: mvp
      APP_PORT: 8000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${MVP_HOST_PORT:-41004}:8000"
    volumes:
      - ../../admin-go:/workspace/admin-go
      - ./start-go-app.sh:/opt/easymvp/docker/dev/start-go-app.sh:ro
      - easymvp-go-cache:/go/pkg/mod
      - easymvp-go-build:/root/.cache/go-build
    restart: unless-stopped

  openhands-runtime:
    profiles: ["ai-runtime"]
    build:
      context: ../../admin-go
      dockerfile: ../docker/build/Dockerfile.openhands.runtime
      args:
        OPENHANDS_RUNTIME_BASE_IMAGE: ${OPENHANDS_RUNTIME_BASE_IMAGE:-python:3.12-slim}
    image: easymvp-openhands-local:latest
    container_name: easymvp-openhands-runtime
    command: ["/bin/sh", "-lc", "sleep infinity"]
    restart: "no"

  web:
    image: easymvp-web-dev:latest
    build:
      context: ../../vue-vben-admin
      dockerfile: ../docker/build/Dockerfile.web.dev
      args:
        WEB_BASE_IMAGE: ${WEB_BASE_IMAGE:-node:22-bookworm}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    container_name: easymvp-web
    working_dir: /workspace/vue-vben-admin
    command: ["/bin/bash", "/opt/easymvp/docker/dev/docker-web-start.sh"]
    depends_on:
      - system
      - ai
      - mvp
    environment:
      CI: "true"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
      TZ: ${TZ:-Asia/Shanghai}
      WEB_CONTAINER_PORT: ${WEB_CONTAINER_PORT:-5666}
      VITE_PROXY_SYSTEM_TARGET: ${VITE_PROXY_SYSTEM_TARGET:-http://system:8000}
      VITE_PROXY_AI_TARGET: ${VITE_PROXY_AI_TARGET:-http://ai:8000}
      VITE_PROXY_MVP_TARGET: ${VITE_PROXY_MVP_TARGET:-http://mvp:8000}
    ports:
      - "${WEB_HOST_PORT:-41005}:${WEB_CONTAINER_PORT:-5666}"
    volumes:
      - ../../vue-vben-admin:/workspace/vue-vben-admin
      - ./docker-web-start.sh:/opt/easymvp/docker/dev/docker-web-start.sh:ro
      - easymvp-web-node-modules:/workspace/vue-vben-admin/node_modules
    restart: unless-stopped

volumes:
  easymvp-redis-data:
  easymvp-mysql-data:
  easymvp-go-cache:
  easymvp-go-build:
  easymvp-web-node-modules:
