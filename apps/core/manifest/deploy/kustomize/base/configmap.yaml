apiVersion: v1
kind: ConfigMap
metadata:
  name: easymvp-core-config
data:
  config.yaml: |
    server:
      address: ":8000"
      openapiPath: "/api.json"
      swaggerPath: "/swagger"

    logger:
      level: "all"
      stdout: true

    easymvp:
      dataRoot: "/app/var"
      dbPath: "/app/var/data/easymvp.db"
      migrationPath: "/app/manifest/migrations"
      brainServeBaseURL: "http://127.0.0.1:7701"
      safeMode: false
      easymvpBrain:
        mode: "local-sidecar"
        localEndpoint: "http://127.0.0.1:7801"
        remoteEndpoint: ""
        apiKey: ""
        timeout: "30s"
        maxTurns: 6
