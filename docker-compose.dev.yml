services:
  mysql:
    image: docker.1ms.run/mysql:8.0
    container_name: easymvp-mysql-dev
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-easymvp}
      MYSQL_USER: ${DB_USER:-easymvp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-JKcHFJYXnkrB6BXE}
    ports:
      - "3306:3306"
    command: ["mysqld","--default-authentication-plugin=mysql_native_password"]
    volumes:
      - .\admin-go\deploy\init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - easymvp-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  system:
    build:
      context: ./admin-go
      dockerfile: docker/dev/Dockerfile.dev
      args:
        GO_PROXY: ${GO_PROXY:-https://proxy.golang.org,direct}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
    container_name: easymvp-system-dev
    working_dir: /workspace/admin-go
    command: ["/bin/bash", "/workspace/admin-go/docker/dev/start-go-app.sh", "system", "8000"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_NAME: system
      APP_PORT: 8000
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-easymvp}
      DB_PASSWORD: ${DB_PASSWORD:-JKcHFJYXnkrB6BXE}
      DB_NAME: ${DB_NAME:-easymvp}
      JWT_SECRET: ${JWT_SECRET:-easymvp-secret-key}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9000:8000"
    volumes:
      - .\admin-go:/workspace/admin-go
      - easymvp-go-cache:/go/pkg/mod
      - easymvp-go-build:/root/.cache/go-build
    restart: unless-stopped

  ai:
    build:
      context: ./admin-go
      dockerfile: docker/dev/Dockerfile.dev
      args:
        GO_PROXY: ${GO_PROXY:-https://proxy.golang.org,direct}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
    container_name: easymvp-ai-dev
    working_dir: /workspace/admin-go
    command: ["/bin/bash", "/workspace/admin-go/docker/dev/start-go-app.sh", "ai", "8000"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_NAME: ai
      APP_PORT: 8000
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-easymvp}
      DB_PASSWORD: ${DB_PASSWORD:-JKcHFJYXnkrB6BXE}
      DB_NAME: ${DB_NAME:-easymvp}
      JWT_SECRET: ${JWT_SECRET:-easymvp-secret-key}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9001:8000"
    volumes:
      - .\admin-go:/workspace/admin-go
      - easymvp-go-cache:/go/pkg/mod
      - easymvp-go-build:/root/.cache/go-build
    restart: unless-stopped

  mvp:
    build:
      context: ./admin-go
      dockerfile: docker/dev/Dockerfile.dev
      args:
        GO_PROXY: ${GO_PROXY:-https://proxy.golang.org,direct}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        APT_MIRROR: ${APT_MIRROR:-}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-}
    container_name: easymvp-mvp-dev
    working_dir: /workspace/admin-go
    command: ["/bin/bash", "/workspace/admin-go/docker/dev/start-go-app.sh", "mvp", "8000"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_NAME: mvp
      APP_PORT: 8000
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-easymvp}
      DB_PASSWORD: ${DB_PASSWORD:-JKcHFJYXnkrB6BXE}
      DB_NAME: ${DB_NAME:-easymvp}
      JWT_SECRET: ${JWT_SECRET:-easymvp-secret-key}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "9002:8000"
    volumes:
      - .\admin-go:/workspace/admin-go
      - easymvp-go-cache:/go/pkg/mod
      - easymvp-go-build:/root/.cache/go-build
    restart: unless-stopped

  openhands-runtime:
    profiles: ["ai-runtime"]
    build:
      context: ./admin-go
      dockerfile: docker/openhands/Dockerfile.runtime
    image: easymvp-openhands-local:latest
    container_name: easymvp-openhands-runtime
    command: ["/bin/sh", "-lc", "sleep infinity"]
    restart: "no"

  web:
    image: node:22-bookworm
    profiles: ["frontend"]
    container_name: easymvp-web-dev
    working_dir: /workspace/vue-vben-admin
    command:
      [
        "/bin/bash",
        "-lc",
        "corepack enable && if [ -n \"$NPM_REGISTRY\" ]; then pnpm config set registry \"$NPM_REGISTRY\"; fi && pnpm install && pnpm -F @vben/web-antd run dev --host 0.0.0.0"
      ]
    environment:
      NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "5666:5666"
    volumes:
      - .\vue-vben-admin:/workspace/vue-vben-admin
      - easymvp-pnpm-store:/root/.local/share/pnpm/store
    restart: unless-stopped

volumes:
  easymvp-mysql-data:
  easymvp-go-cache:
  easymvp-go-build:
  easymvp-pnpm-store:
