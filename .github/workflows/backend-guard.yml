name: Backend Guard

on:
  pull_request:
    paths:
      - '.github/workflows/backend-guard.yml'
      - '.github/workflows/deploy.yml'
      - 'admin-go/**'
      - 'scripts/github-actions-only.sh'
      - 'scripts/github-actions-write-latest-json.sh'
      - 'test-workspaces/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Validation target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - validate
          - test-backend
          - test-codegen
          - build-services

env:
  GO_VERSION: '1.25.0'

jobs:
  validate-regression:
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'validate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: admin-go/go.sum

      - name: Validate regression manifest and delivery policy
        run: |
          bash ./test-workspaces/validate.sh

  test-backend:
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'test-backend'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: admin-go/go.sum

      - name: Test backend
        run: |
          cd admin-go
          go test ./...

  test-codegen:
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'test-codegen'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: admin-go/codegen/go.sum

      - name: Test codegen
        run: |
          cd admin-go/codegen
          go test ./...

  build-services:
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'build-services'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: system
            entry: ./app/system/main.go
          - app: ai
            entry: ./app/ai/main.go
          - app: mvp
            entry: ./app/mvp/main.go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: admin-go/go.sum

      - name: Build ${{ matrix.app }}
        run: |
          cd admin-go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -o "/tmp/${{ matrix.app }}" "${{ matrix.entry }}"

  publish-ci-result:
    needs: [validate-regression, test-backend, test-codegen, build-services]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend latest.json
        env:
          VALIDATE_RESULT: ${{ needs['validate-regression'].result }}
          TEST_BACKEND_RESULT: ${{ needs['test-backend'].result }}
          TEST_CODEGEN_RESULT: ${{ needs['test-codegen'].result }}
          BUILD_SERVICES_RESULT: ${{ needs['build-services'].result }}
          EASYMVP_CI_OUTPUT: .easymvp/ci/latest.json
          EASYMVP_CI_WORKFLOW: ${{ github.workflow }}
          EASYMVP_CI_PIPELINE: backend-guard
          EASYMVP_CI_RUN_ID: ${{ github.run_id }}
          EASYMVP_CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EASYMVP_CI_SUMMARY: backend-guard GitHub Actions 结果
        run: |
          checks_json="$(
            python3 - <<'PY'
          import json
          import os


          def map_result(value: str) -> str:
              text = (value or "").strip().lower()
              if text == "success":
                  return "passed"
              if text in {"failure", "cancelled"}:
                  return "failed"
              return "pending"


          checks = []
          for job, name, kind, result, summary, command in [
              ("validate-regression", "validate regression manifest and delivery policy", "runtime", os.environ.get("VALIDATE_RESULT"), "bash ./test-workspaces/validate.sh", "bash ./test-workspaces/validate.sh"),
              ("test-backend", "backend go test ./...", "test", os.environ.get("TEST_BACKEND_RESULT"), "cd admin-go && go test ./...", "go test ./..."),
              ("test-codegen", "codegen go test ./...", "test", os.environ.get("TEST_CODEGEN_RESULT"), "cd admin-go/codegen && go test ./...", "go test ./..."),
              ("build-services", "build system/ai/mvp", "build", os.environ.get("BUILD_SERVICES_RESULT"), "CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build system ai mvp", "go build system ai mvp"),
          ]:
              normalized = (result or "").strip().lower()
              if not normalized or normalized == "skipped":
                  continue
              checks.append(
                  {
                      "name": name,
                      "kind": kind,
                      "status": map_result(normalized),
                      "summary": f"{summary}; job_result={normalized}",
                      "command": command,
                      "workflow": "backend-guard",
                      "job": job,
                  }
              )

          print(json.dumps(checks, ensure_ascii=False))
            PY
          )"
          if [ "$checks_json" = "[]" ]; then
            echo "No backend checks were selected for this run; skip latest.json generation."
            exit 0
          fi
          export EASYMVP_CI_CHECKS_JSON="$checks_json"
          ./scripts/github-actions-write-latest-json.sh
          cat .easymvp/ci/latest.json

      - name: Upload backend latest.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-guard-ci-latest
          path: .easymvp/ci/latest.json
          if-no-files-found: ignore
