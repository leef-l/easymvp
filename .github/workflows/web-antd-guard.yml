name: Web Antd Guard

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/web-antd-guard.yml'
      - 'scripts/web-antd-*.sh'
      - 'vue-vben-admin/**'
  pull_request:
    paths:
      - '.github/workflows/web-antd-guard.yml'
      - 'scripts/web-antd-*.sh'
      - 'vue-vben-admin/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Validation target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - verify-build
          - workflow-bundle
          - entry-bundles
          - source-bundles

env:
  NODE_IMAGE: 'node:22-bookworm'
  NODE_VERSION: '22.18.0'
  PNPM_VERSION: '10.32.1'

jobs:
  web-antd-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: verify-build
            label: web-antd verification build
            artifact_path: vue-vben-admin/apps/web-antd/dist-verify
            upload_artifact: true
            shard_index: 0
            shard_total: 0
          - mode: workflow-bundle
            label: web-antd workflow bundle build
            artifact_path: vue-vben-admin/dist-workflow-verify
            upload_artifact: true
            shard_index: 0
            shard_total: 0
          - mode: entry-bundles
            label: web-antd workflow entry bundles
            artifact_path: vue-vben-admin/dist-entry-verify-*
            upload_artifact: true
            shard_index: 0
            shard_total: 0
          - mode: source-bundles
            label: web-antd full-source bundle shard 1/6
            artifact_path: ''
            upload_artifact: false
            shard_index: 1
            shard_total: 6
          - mode: source-bundles
            label: web-antd full-source bundle shard 2/6
            artifact_path: ''
            upload_artifact: false
            shard_index: 2
            shard_total: 6
          - mode: source-bundles
            label: web-antd full-source bundle shard 3/6
            artifact_path: ''
            upload_artifact: false
            shard_index: 3
            shard_total: 6
          - mode: source-bundles
            label: web-antd full-source bundle shard 4/6
            artifact_path: ''
            upload_artifact: false
            shard_index: 4
            shard_total: 6
          - mode: source-bundles
            label: web-antd full-source bundle shard 5/6
            artifact_path: ''
            upload_artifact: false
            shard_index: 5
            shard_total: 6
          - mode: source-bundles
            label: web-antd full-source bundle shard 6/6
            artifact_path: ''
            upload_artifact: false
            shard_index: 6
            shard_total: 6
    name: ${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target selection
        id: selection
        run: |
          selected=false
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || \
             [ "${{ github.event.inputs.target }}" = "all" ] || \
             [ "${{ github.event.inputs.target }}" = "${{ matrix.mode }}" ]; then
            selected=true
          fi
          echo "selected=$selected" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.selection.outputs.selected == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: steps.selection.outputs.selected == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        if: steps.selection.outputs.selected == 'true'
        uses: actions/cache@v4
        with:
          path: vue-vben-admin/.pnpm-store
          key: pnpm-web-antd-guard-${{ runner.os }}-${{ hashFiles('vue-vben-admin/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-web-antd-guard-${{ runner.os }}-

      - name: Install frontend dependencies
        if: steps.selection.outputs.selected == 'true'
        run: |
          cd vue-vben-admin
          pnpm config set store-dir "$GITHUB_WORKSPACE/vue-vben-admin/.pnpm-store"
          pnpm install --frozen-lockfile

      - name: Run validation under 1 CPU / 1G
        if: steps.selection.outputs.selected == 'true'
        env:
          MODE: ${{ matrix.mode }}
        run: |
          docker run --rm \
            --cpus="1.0" \
            --memory="1g" \
            --memory-swap="1g" \
            -e MODE="$MODE" \
            -e EASYMVP_WEB_ANTD_SHARD_INDEX="${{ matrix.shard_index }}" \
            -e EASYMVP_WEB_ANTD_SHARD_TOTAL="${{ matrix.shard_total }}" \
            -e COREPACK_ENABLE_DOWNLOAD_PROMPT=0 \
            -e PNPM_STORE_DIR=/workspace/vue-vben-admin/.pnpm-store \
            -e EASYMVP_BUILD_HEAP_MB=768 \
            -e UV_THREADPOOL_SIZE=1 \
            -e npm_config_jobs=1 \
            -e npm_config_maxsockets=4 \
            -e pnpm_config_child_concurrency=1 \
            -e pnpm_config_workspace_concurrency=1 \
            -e pnpm_config_network_concurrency=1 \
            -e TURBO_CONCURRENCY=1 \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            "${{ env.NODE_IMAGE }}" \
            bash -lc '
              set -euo pipefail
              corepack enable
              corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
              cd /workspace
              case "$MODE" in
                verify-build)
                  ./scripts/web-antd-ci-verify-build.sh
                  ;;
                workflow-bundle)
                  ./scripts/web-antd-ci-workflow-bundle.sh
                  ;;
                entry-bundles)
                  ./scripts/web-antd-ci-workflow-entry-bundles.sh
                  ;;
                source-bundles)
                  ./scripts/web-antd-ci-source-bundles.sh
                  ;;
                *)
                  echo "Unsupported mode: $MODE" >&2
                  exit 2
                  ;;
              esac
            '

      - name: Skip non-selected target
        if: steps.selection.outputs.selected != 'true'
        run: |
          echo "Skip ${{ matrix.mode }} for workflow_dispatch target=${{ github.event.inputs.target }}"

      - name: Upload validation artifact
        if: success() && steps.selection.outputs.selected == 'true' && matrix.upload_artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mode }}-artifact
          path: ${{ matrix.artifact_path }}
          if-no-files-found: ignore
