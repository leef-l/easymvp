name: Web Antd Guard

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/web-antd-guard.yml'
      - 'scripts/github-actions-write-latest-json.sh'
      - 'scripts/web-antd-*.sh'
      - 'vue-vben-admin/**'
  pull_request:
    paths:
      - '.github/workflows/web-antd-guard.yml'
      - 'scripts/github-actions-write-latest-json.sh'
      - 'scripts/web-antd-*.sh'
      - 'vue-vben-admin/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Validation target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - full-typecheck
          - full-build
          - verify-build
          - workflow-bundle
          - entry-bundles

env:
  NODE_IMAGE: 'node:22-bookworm'
  NODE_VERSION: '22.18.0'
  PNPM_VERSION: '10.32.1'

jobs:
  web-antd-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: full-typecheck
            label: web-antd full typecheck
            kind: lint
            artifact_path: ''
          - mode: full-build
            label: web-antd full production build
            kind: build
            artifact_path: vue-vben-admin/apps/web-antd/dist
          - mode: verify-build
            label: web-antd verification build
            kind: build
            artifact_path: vue-vben-admin/apps/web-antd/dist-verify
          - mode: workflow-bundle
            label: web-antd workflow bundle build
            kind: build
            artifact_path: vue-vben-admin/apps/web-antd/dist-workflow-verify
          - mode: entry-bundles
            label: web-antd workflow entry bundles
            kind: build
            artifact_path: vue-vben-admin/apps/web-antd/dist-entry-verify-*
    name: ${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target selection
        id: selection
        run: |
          selected=false
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || \
             [ "${{ github.event.inputs.target }}" = "all" ] || \
             [ "${{ github.event.inputs.target }}" = "${{ matrix.mode }}" ]; then
            selected=true
          fi
          echo "selected=$selected" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.selection.outputs.selected == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: steps.selection.outputs.selected == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        if: steps.selection.outputs.selected == 'true'
        uses: actions/cache@v4
        with:
          path: vue-vben-admin/.pnpm-store
          key: pnpm-web-antd-guard-${{ runner.os }}-${{ hashFiles('vue-vben-admin/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-web-antd-guard-${{ runner.os }}-

      - name: Install frontend dependencies
        if: steps.selection.outputs.selected == 'true'
        run: |
          cd vue-vben-admin
          pnpm config set store-dir "$GITHUB_WORKSPACE/vue-vben-admin/.pnpm-store"
          pnpm install --frozen-lockfile

      - name: Run validation under 1 CPU / 1G
        if: steps.selection.outputs.selected == 'true'
        env:
          MODE: ${{ matrix.mode }}
        run: |
          docker run --rm \
            --cpus="1.0" \
            --memory="1g" \
            --memory-swap="1g" \
            -e MODE="$MODE" \
            -e COREPACK_ENABLE_DOWNLOAD_PROMPT=0 \
            -e PNPM_STORE_DIR=/workspace/vue-vben-admin/.pnpm-store \
            -e EASYMVP_BUILD_HEAP_MB=768 \
            -e UV_THREADPOOL_SIZE=1 \
            -e npm_config_jobs=1 \
            -e npm_config_maxsockets=4 \
            -e pnpm_config_child_concurrency=1 \
            -e pnpm_config_workspace_concurrency=1 \
            -e pnpm_config_network_concurrency=1 \
            -e TURBO_CONCURRENCY=1 \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            "${{ env.NODE_IMAGE }}" \
            bash -lc '
              set -euo pipefail
              corepack enable
              corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
              cd /workspace
              case "$MODE" in
                full-typecheck)
                  ./scripts/web-antd-ci-typecheck.sh
                  ;;
                full-build)
                  ./scripts/web-antd-ci-full-build.sh
                  ;;
                verify-build)
                  ./scripts/web-antd-ci-verify-build.sh
                  ;;
                workflow-bundle)
                  ./scripts/web-antd-ci-workflow-bundle.sh
                  ;;
                entry-bundles)
                  ./scripts/web-antd-ci-workflow-entry-bundles.sh
                  ;;
                *)
                  echo "Unsupported mode: $MODE" >&2
                  exit 2
                  ;;
              esac
            '

      - name: Skip non-selected target
        if: steps.selection.outputs.selected != 'true'
        run: |
          echo "Skip ${{ matrix.mode }} for workflow_dispatch target=${{ github.event.inputs.target }}"

      - name: Record CI check result
        if: always() && steps.selection.outputs.selected == 'true'
        env:
          CHECK_NAME: ${{ matrix.label }}
          CHECK_KIND: ${{ matrix.kind }}
          CHECK_MODE: ${{ matrix.mode }}
          CHECK_STATUS: ${{ job.status }}
        run: |
          mkdir -p .tmp/web-antd-guard
          python3 - <<'PY'
          import json
          import os

          path = os.path.join(".tmp", "web-antd-guard", f"{os.environ['CHECK_MODE']}.json")
          payload = {
              "name": os.environ["CHECK_NAME"],
              "kind": os.environ["CHECK_KIND"],
              "status": os.environ["CHECK_STATUS"],
              "summary": f"{os.environ['CHECK_NAME']}; job_result={os.environ['CHECK_STATUS']}",
              "workflow": "web-antd-guard",
              "job": os.environ["CHECK_MODE"],
          }
          with open(path, "w", encoding="utf-8") as fh:
              json.dump(payload, fh, ensure_ascii=False, indent=2)
              fh.write("\n")
          PY

      - name: Upload CI check result
        if: always() && steps.selection.outputs.selected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: web-antd-ci-check-${{ matrix.mode }}
          path: .tmp/web-antd-guard/${{ matrix.mode }}.json
          if-no-files-found: ignore

      - name: Upload validation artifact
        if: success() && steps.selection.outputs.selected == 'true' && matrix.artifact_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mode }}-artifact
          path: ${{ matrix.artifact_path }}
          if-no-files-found: ignore

  publish-ci-result:
    needs: [web-antd-guard]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download CI check results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: web-antd-ci-check-*
          path: .tmp/web-antd-guard
          merge-multiple: true

      - name: Build web-antd latest.json
        env:
          EASYMVP_CI_OUTPUT: .easymvp/ci/latest.json
          EASYMVP_CI_WORKFLOW: ${{ github.workflow }}
          EASYMVP_CI_PIPELINE: web-antd-guard
          EASYMVP_CI_RUN_ID: ${{ github.run_id }}
          EASYMVP_CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EASYMVP_CI_SUMMARY: web-antd-guard GitHub Actions 结果
        run: |
          checks_json="$(
            python3 - <<'PY'
          import glob
          import json

          checks = []
          for path in sorted(glob.glob(".tmp/web-antd-guard/*.json")):
              with open(path, "r", encoding="utf-8") as fh:
                  payload = json.load(fh)
              if isinstance(payload, dict):
                  checks.append(payload)

          print(json.dumps(checks, ensure_ascii=False))
            PY
          )"
          if [ "$checks_json" = "[]" ]; then
            echo "No web-antd checks were selected for this run; skip latest.json generation."
            exit 0
          fi
          export EASYMVP_CI_CHECKS_JSON="$checks_json"
          ./scripts/github-actions-write-latest-json.sh
          cat .easymvp/ci/latest.json

      - name: Upload web-antd latest.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-antd-guard-ci-latest
          path: .easymvp/ci/latest.json
          if-no-files-found: ignore
