name: Deploy EasyMVP

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'admin-go/**'
      - 'scripts/**'
      - 'vue-vben-admin/**'
      - 'docker/prod/init-server.sh'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

env:
  SERVER_HOST: mvp.easytestdev.online
  SERVER_USER: root
  DEPLOY_DIR: /www/wwwroot/mvp.easytestdev.online
  GO_VERSION: '1.25.0'
  NODE_VERSION: '22.18.0'
  PNPM_VERSION: '10.32.1'
  PNPM_NETWORK_CONCURRENCY: '3'
  PNPM_CHILD_CONCURRENCY: '1'
  FRONTEND_NODE_MAX_OLD_SPACE_SIZE: '4096'
  BACKEND_SERVICE_TASKS_MAX: '512'
  BACKEND_SERVICE_NICE: '5'
  BACKEND_SERVICE_MEMORY_HIGH: '512M'
  BACKEND_SERVICE_MEMORY_MAX: '768M'
  BACKEND_SERVICE_CPU_QUOTA: '80%'
  BACKEND_SERVICE_OOM_SCORE_ADJUST: '200'
  SYSTEM_PORT: '41002'
  AI_PORT: '41003'
  MVP_PORT: '41004'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      infra: ${{ steps.changes.outputs.infra }}
      target: ${{ steps.target.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'admin-go/**'
            frontend:
              - 'vue-vben-admin/**'
            infra:
              - '.github/workflows/deploy.yml'
              - 'scripts/**'
              - 'docker/prod/init-server.sh'

      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=auto" >> "$GITHUB_OUTPUT"
          fi

  verify-backend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.target == 'all' ||
      needs.detect-changes.outputs.target == 'backend' ||
      (
        needs.detect-changes.outputs.target == 'auto' &&
        (
          needs.detect-changes.outputs.backend == 'true' ||
          needs.detect-changes.outputs.infra == 'true'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            admin-go/go.sum
            admin-go/codegen/go.sum

      - name: Validate regression manifest and delivery policy
        run: |
          bash ./test-workspaces/validate.sh

      - name: Test backend
        run: |
          cd admin-go
          export GF_LOG_PATH="$RUNNER_TEMP/easymvp-logs"
          mkdir -p "$GF_LOG_PATH"
          python - <<'PY'
          from pathlib import Path
          import os
          path = Path("app/mvp/manifest/config/config.yaml")
          text = path.read_text()
          text = text.replace('/www/wwwroot/project/easymvp/admin-go/logs/mvp', os.environ["GF_LOG_PATH"])
          path.write_text(text)
          PY
          go test ./...

      - name: Test codegen
        run: |
          cd admin-go/codegen
          export GF_LOG_PATH="$RUNNER_TEMP/easymvp-logs"
          mkdir -p "$GF_LOG_PATH"
          go test ./...

  verify-frontend:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.target == 'all' ||
      needs.detect-changes.outputs.target == 'frontend' ||
      (
        needs.detect-changes.outputs.target == 'auto' &&
        (
          needs.detect-changes.outputs.frontend == 'true' ||
          needs.detect-changes.outputs.infra == 'true'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-frontend-${{ hashFiles('vue-vben-admin/pnpm-lock.yaml') }}
          restore-keys: pnpm-frontend-

      - name: Install frontend dependencies
        run: |
          cd vue-vben-admin
          pnpm install --frozen-lockfile

      - name: Typecheck workflow console scope
        run: |
          cd vue-vben-admin
          NODE_OPTIONS=--max-old-space-size=${{ env.FRONTEND_NODE_MAX_OLD_SPACE_SIZE }} \
          pnpm exec vue-tsc --noEmit -p apps/web-antd/tsconfig.mvp-workflow.json

      - name: Verify workflow frontend build
        run: |
          cd vue-vben-admin
          CI=1 \
          EASYMVP_WEB_ANTD_VERIFY_BUILD=1 \
          NODE_OPTIONS=--max-old-space-size=${{ env.FRONTEND_NODE_MAX_OLD_SPACE_SIZE }} \
          pnpm_config_child_concurrency=${{ env.PNPM_CHILD_CONCURRENCY }} \
          pnpm_config_network_concurrency=${{ env.PNPM_NETWORK_CONCURRENCY }} \
          pnpm --filter @vben/web-antd exec vite build --mode production

  deploy-system:
    needs: [detect-changes, verify-backend]
    if: |
      (needs.verify-backend.result == 'success' || needs.verify-backend.result == 'skipped') &&
      (
        needs.detect-changes.outputs.target == 'all' ||
        needs.detect-changes.outputs.target == 'backend' ||
        (
          needs.detect-changes.outputs.target == 'auto' &&
          (
            needs.detect-changes.outputs.backend == 'true' ||
            needs.detect-changes.outputs.infra == 'true'
          )
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: admin-go/go.sum

      - name: Build system
        run: |
          cd admin-go
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-s -w" -o system ./app/system/main.go

      - name: Validate deploy SSH secret
        run: |
          test -n "${{ secrets.MVP_DEPLOY_SSH_KEY }}"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MVP_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy system
        env:
          APP: system
          PORT: ${{ env.SYSTEM_PORT }}
          REMOTE: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
        run: |
          ssh "$REMOTE" "mkdir -p /tmp/easymvp_stage/$APP"
          scp "admin-go/$APP" "$REMOTE:/tmp/easymvp_stage/$APP/$APP"
          scp -r "admin-go/app/$APP/manifest" "$REMOTE:/tmp/easymvp_stage/$APP/"
          ssh "$REMOTE" "APP='$APP' PORT='$PORT' DEPLOY_DIR='${{ env.DEPLOY_DIR }}' bash -s" <<'EOF'
          set -euo pipefail

          SERVICE_NAME="mvp-$APP"
          STAGE_DIR="/tmp/easymvp_stage/$APP"
          APP_DIR="$DEPLOY_DIR/$APP"
          APP_BIN="$APP_DIR/$APP"
          APP_BIN_NEW="$APP_DIR/$APP.new"
          MANIFEST_DIR="$APP_DIR/manifest"
          CONFIG_DIR="$MANIFEST_DIR/config"
          CONFIG_FILE="$CONFIG_DIR/config.yaml"

          echo "[$APP] Preparing service..."
          mkdir -p "$APP_DIR"
          install -m 0755 "$STAGE_DIR/$APP" "$APP_BIN_NEW"

          if [ ! -d "$MANIFEST_DIR" ]; then
            cp -r "$STAGE_DIR/manifest" "$MANIFEST_DIR"
          fi

          mkdir -p "$CONFIG_DIR"
          if [ ! -f "$CONFIG_FILE" ]; then
            if [ -f "$STAGE_DIR/manifest/config/config.yaml" ]; then
              cp "$STAGE_DIR/manifest/config/config.yaml" "$CONFIG_FILE"
            elif [ -f "$STAGE_DIR/manifest/config/config.yaml.example" ]; then
              cp "$STAGE_DIR/manifest/config/config.yaml.example" "$CONFIG_FILE"
            fi
          fi

          printf '%s\n' \
            '[Unit]' \
            "Description=EasyMVP $APP" \
            'After=network.target mysql.service redis.service' \
            '' \
            '[Service]' \
            'Type=simple' \
            "WorkingDirectory=$APP_DIR" \
            "Environment=GF_GCFG_PATH=$CONFIG_DIR" \
            'Environment=GF_GCFG_FILE=config.yaml' \
            "Environment=GF_SERVER_ADDRESS=:$PORT" \
            'Environment=REDIS_ADDR=127.0.0.1:6379' \
            'Environment=TZ=Asia/Shanghai' \
            "ExecStart=$APP_BIN" \
            'MemoryAccounting=true' \
            'CPUAccounting=true' \
            'TasksAccounting=true' \
            "MemoryHigh=${{ env.BACKEND_SERVICE_MEMORY_HIGH }}" \
            "MemoryMax=${{ env.BACKEND_SERVICE_MEMORY_MAX }}" \
            "CPUQuota=${{ env.BACKEND_SERVICE_CPU_QUOTA }}" \
            "TasksMax=${{ env.BACKEND_SERVICE_TASKS_MAX }}" \
            "Nice=${{ env.BACKEND_SERVICE_NICE }}" \
            "OOMScoreAdjust=${{ env.BACKEND_SERVICE_OOM_SCORE_ADJUST }}" \
            'Restart=always' \
            'RestartSec=5' \
            'LimitNOFILE=65536' \
            '' \
            '[Install]' \
            'WantedBy=multi-user.target' \
            > "/etc/systemd/system/$SERVICE_NAME.service"

          systemctl daemon-reload
          systemctl stop "$SERVICE_NAME" 2>/dev/null || true

          for i in $(seq 1 10); do
            if ! pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          if pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
            pkill -TERM -f -x "$APP_BIN" 2>/dev/null || true
            sleep 2
          fi
          if pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
            pkill -KILL -f -x "$APP_BIN" 2>/dev/null || true
            sleep 1
          fi
          if pgrep -f -x "$APP_BIN" >/dev/null 2>&1; then
            echo "[$APP] Process still running after stop" >&2
            exit 1
          fi

          mv -f "$APP_BIN_NEW" "$APP_BIN"

          echo "[$APP] Starting service..."
          systemctl enable "$SERVICE_NAME"
          systemctl start "$SERVICE_NAME"

          for i in $(seq 1 8); do
            status=$(systemctl is-active "$SERVICE_NAME" 2>/dev/null || echo 'unknown')
            if [ "$status" = 'active' ]; then
              break
            fi
            sleep 1
          done

          status=$(systemctl is-active "$SERVICE_NAME" 2>/dev/null || echo 'unknown')
          echo "[$APP] Status: $status"
          if [ "$status" != 'active' ]; then
            exit 1
          fi

          HEALTH_URL="http://127.0.0.1:$PORT/api.json"
          echo "[$APP] Health check: $HEALTH_URL"
          for i in $(seq 1 15); do
            if curl --silent --show-error --fail "$HEALTH_URL" >/dev/null; then
              break
            fi
            sleep 2
          done
          curl --silent --show-error --fail "$HEALTH_URL" >/dev/null

          rm -rf "$STAGE_DIR"
          EOF

