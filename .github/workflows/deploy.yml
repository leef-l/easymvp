  deploy-frontend:
    needs: [detect-changes, deploy-mvp, verify-frontend]
    if: |
      always() &&
      (needs.deploy-mvp.result == 'success' || needs.deploy-mvp.result == 'skipped') &&
      (needs.verify-frontend.result == 'success' || needs.verify-frontend.result == 'skipped') &&
      (
        needs.detect-changes.outputs.target == 'all' ||
        needs.detect-changes.outputs.target == 'frontend' ||
        (
          needs.detect-changes.outputs.target == 'auto' &&
          (
            needs.detect-changes.outputs.frontend == 'true' ||
            needs.detect-changes.outputs.infra == 'true'
          )
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-frontend-${{ hashFiles('vue-vben-admin/pnpm-lock.yaml') }}
          restore-keys: pnpm-frontend-

      - name: Install & build frontend
        run: |
          cd vue-vben-admin
          pnpm install --frozen-lockfile
          NODE_OPTIONS=--max-old-space-size=${{ env.FRONTEND_NODE_MAX_OLD_SPACE_SIZE }} \
          pnpm build:antd

      - name: Validate deploy SSH secret
        run: |
          test -n "${{ secrets.MVP_DEPLOY_SSH_KEY }}"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MVP_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        env:
          REMOTE: ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}
        run: |
          cd vue-vben-admin/apps/web-antd/dist
          tar -czf /tmp/easymvp-frontend.tar.gz .
          echo "Frontend size: $(du -h /tmp/easymvp-frontend.tar.gz | cut -f1)"
          scp /tmp/easymvp-frontend.tar.gz "$REMOTE:/tmp/easymvp-frontend.tar.gz"
          ssh "$REMOTE" "DEPLOY_DIR='${{ env.DEPLOY_DIR }}' bash -s" <<'EOF'
          set -euo pipefail

          RELEASES_DIR="$DEPLOY_DIR/.releases/admin"
          RELEASE_ID=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR="$RELEASES_DIR/$RELEASE_ID"
          NEXT_LINK="$DEPLOY_DIR/admin.__new"

          mkdir -p "$RELEASES_DIR"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf /tmp/easymvp-frontend.tar.gz -C "$RELEASE_DIR"
          test -f "$RELEASE_DIR/index.html"

          rm -f "$NEXT_LINK"
          ln -s "$RELEASE_DIR" "$NEXT_LINK"

          if [ -d "$DEPLOY_DIR/admin" ] && [ ! -L "$DEPLOY_DIR/admin" ]; then
            LEGACY_BACKUP="$DEPLOY_DIR/.legacy-admin-$(date +%Y%m%d%H%M%S)"
            mv "$DEPLOY_DIR/admin" "$LEGACY_BACKUP"
          fi

          mv -Tf "$NEXT_LINK" "$DEPLOY_DIR/admin"
          ls -1dt "$RELEASES_DIR"/* 2>/dev/null | tail -n +6 | xargs -r rm -rf
          rm -f /tmp/easymvp-frontend.tar.gz
          echo "Frontend deployed to $RELEASE_DIR"
          EOF

  status-check:
    needs: [deploy-system, deploy-ai, deploy-mvp, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy SSH secret
        run: |
          test -n "${{ secrets.MVP_DEPLOY_SSH_KEY }}"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MVP_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Check service status
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} 'bash -s' <<'EOF'
          set -euo pipefail
          echo "===== Service Status ====="
          for app in system ai mvp; do
            status=$(systemctl is-active "mvp-$app" 2>/dev/null || echo 'unknown')
            echo "mvp-$app: $status"
          done
          EOF

      - name: Summary
        run: |
          echo "## Deploy Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Port | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| system | ${{ env.SYSTEM_PORT }} | ${{ needs.deploy-system.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ai | ${{ env.AI_PORT }} | ${{ needs.deploy-ai.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| mvp | ${{ env.MVP_PORT }} | ${{ needs.deploy-mvp.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| frontend | /admin/ | ${{ needs.deploy-frontend.result }} |" >> "$GITHUB_STEP_SUMMARY"
