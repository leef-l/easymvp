name: Core Release

on:
  workflow_dispatch:
  push:
    tags:
      - "core-v*"

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: easymvp-core-linux-amd64
            asset_path: apps/core/dist/easymvp-core-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: easymvp-core-windows-amd64.exe
            asset_path: apps/core/dist/easymvp-core-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/core/go.mod
          cache-dependency-path: apps/core/go.sum

      - name: Test apps/core
        run: |
          cd apps/core
          go test ./...

      - name: Build release binary
        shell: bash
        run: |
          mkdir -p apps/core/dist
          cd apps/core
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o "$(basename "${{ matrix.asset_path }}")" ./main.go

      - name: Upload release binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_path }}
          if-no-files-found: error

      - name: Attach binary to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_path }}

  publish-container:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/easymvp-core
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: apps/core
          file: apps/core/manifest/docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
