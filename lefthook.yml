# easymvp lefthook configuration
# Refer for explanation to following link:
# https://lefthook.dev/configuration/

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    go-vet:
      root: apps/core
      glob: "*.go"
      run: go vet ./...
    go-build:
      root: apps/core
      glob: "*.go"
      run: go build ./...
    frontend-typecheck:
      root: apps/desktop
      glob: "*.{ts,tsx}"
      run: pnpm run typecheck
    no-commit-to-main:
      run: |
        branch=$(git branch --show-current)
        if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
          echo "Direct commits to main/master are not allowed. Use a feature branch and open a PR."
          exit 1
        fi

post-checkout:
  commands:
    packages-audit:
      tags: frontend security
      run: pnpm audit

# Run with: lefthook run pre-commit
