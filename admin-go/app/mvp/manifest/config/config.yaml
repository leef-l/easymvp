# https://goframe.org/docs/web/server-config-file-template
server:
  address:     ":9002"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"

# https://goframe.org/docs/core/glog-config
logger:
  path:              "/www/wwwroot/project/easymvp/admin-go/logs/mvp"
  level:             "all"
  stdout:            false
  rotateSize:        "100M"
  rotateExpire:      "7d"
  rotateBackupLimit: 10
  stStatus:          0

# https://goframe.org/docs/core/gdb-config-file
database:
  default:
    link: "mysql:easymvp:JKcHFJYXnkrB6BXE@tcp(127.0.0.1:3306)/easymvp"
    debug: false
    charset: "utf8mb4"

# Redis 配置（GoFrame gredis）
# 地址通过环境变量 REDIS_ADDR 覆盖，默认本地
redis:
  default:
    address: "127.0.0.1:6379"
    db:      0

# JWT 配置
jwt:
  secret: "easymvp-secret-key-2026"
  expire: 24  # Token 过期时间（小时）

# 引擎配置（数据库 mvp_config 表优先，未配置时使用此处值）
engine:
  runtime:
    taskTimeoutSeconds: 600  # MVP 项目任务执行超时（秒）
    maxSteps: 2              # 最大内部执行步数；当前 Aider 最多使用到精简重试
  watchdog:
    checkInterval: 120    # 心跳检测间隔（秒）
    maxStaleCount: 3      # 连续无进展次数阈值
    maxRetries: 3         # 最大自动重试次数
  scheduler:
    maxConcurrent: 20     # 最大并发任务数
    pollInterval: 2       # 调度轮询间隔（秒）
