# https://goframe.org/docs/web/server-config-file-template
server:
  address:     ":9002"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"

# https://goframe.org/docs/core/glog-config
logger:
  path:              "/www/wwwroot/project/easymvp/admin-go/logs/mvp"
  level:             "all"
  stdout:            false
  rotateSize:        "100M"
  rotateExpire:      "7d"
  rotateBackupLimit: 10
  stStatus:          0

# https://goframe.org/docs/core/gdb-config-file
database:
  default:
    link: "mysql:easymvp:JKcHFJYXnkrB6BXE@tcp(127.0.0.1:3306)/easymvp"
    debug: false
    charset: "utf8mb4"

# Redis 配置（GoFrame gredis）
# 地址通过环境变量 REDIS_ADDR 覆盖，默认本地
redis:
  default:
    address: "127.0.0.1:6379"
    db:      0

# JWT 配置
jwt:
  secret: "easymvp-secret-key-2026"
  expire: 24  # Token 过期时间（小时）

# 引擎配置（数据库 mvp_config 表优先，未配置时使用此处值）
engine:
  runtime:
    taskTimeoutSeconds: 600  # MVP 项目任务执行超时（秒）
    maxSteps: 2              # 最大内部执行步数；当前 Aider 最多使用到精简重试
  watchdog:
    checkInterval: 20              # 心跳检测间隔（秒）
    heartbeatTimeoutSeconds: 60    # lease / heartbeat 超时阈值（秒）
    maxStaleCount: 3               # 兼容旧语义，仅用于观测日志
    maxRetries: 3                  # 最大自动重试次数
  scheduler:
    maxConcurrent: 3      # 调度并发上限
    pollInterval: 2       # 调度轮询间隔（秒）
  commandResource:
    enabled: 1
    nodeMaxOldSpaceMB: 1024        # npm/pnpm/node 构建内存上限
    npmJobs: 1                     # npm 安装/构建并发
    npmNetworkConcurrency: 4       # npm/pnpm 网络并发
    pnpmChildConcurrency: 1        # pnpm 子进程并发
    pnpmWorkspaceConcurrency: 1    # pnpm workspace 并发
    goMaxProcs: 1                  # go test/build 默认并发核数
    goMemLimitMB: 768              # Go 运行时内存上限
    composeParallelLimit: 1        # docker compose 并行操作上限
    turboConcurrency: 1            # turbo build 并发
    makeJobs: 1                    # make -j 并发
    cargoBuildJobs: 1              # cargo build 并发
    processAddressSpaceMB: 1536    # prlimit 进程地址空间上限（Linux）
  workspace:
    delivery:
      defaultMode: "patch"                # 结果形态：patch / pr / manual
      defaultSyncStrategy: "auto_apply"   # 全局兜底策略
      lowRiskMode: "patch"                # 低风险默认自动回写
      lowRiskSyncStrategy: "auto_apply"
      mediumRiskMode: "patch"             # 中风险保留 patch，但默认人工确认
      mediumRiskSyncStrategy: "manual"
      highRiskMode: "manual"              # 高风险先进入人工交付路径
      highRiskSyncStrategy: "manual"

workflow:
  event_stream:
    enabled: false
    stream_name: "easymvp:workflow:task-events"
    consumer_group: "easymvp-workflow"
    consumer_name: "${HOSTNAME}"
    block_ms: 5000
    reclaim_idle_seconds: 60
    redis_required: false
    consumer_enabled: false
